name: "Build kernels"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build.yml"
      - "repos.json"

jobs:
  Set-repos:
    name: "рЯРВ Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "рЯШД Checkout"
        uses: actions/checkout@v4
      - name: "Print repos.json"
        run: cat ${{ env.CONFIGURATION }}
      - name: "рЯШЖ Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos=$(jq -c . < ${{ env.CONFIGURATION }})" >> $GITHUB_OUTPUT
      - name: "Print generated repos"
        run: echo ${{ steps.generate-matrix.outputs.repos }}

  Build-Kernel:
    name: "рЯРО Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: ${{ matrix.repos.kernelSource.device }}
      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.device }}_defconfig
      withKernelSU: ${{ matrix.repos.withKernelSU }}

    steps:
      - name: "вЬ® Create working dir"
        run: mkdir -p $kernelDir
      - name: fix kali directory error
        run: mkdir -p ./Tensor101\ NetHunter_bluejay
      - name: "в≠Р Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip ftp gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python3 libarchive-tools

      - name: "рЯМЯ Clone kernel source => (${{ env.kernelRepo }})"
        working-directory: ./${{ env.kernelDir }}
        run: |
          git clone --recursive --branch ${{ env.kernelBranch }} ${{ env.kernelRepo }} ${{ env.kernelName }} --depth=1

      - name: "рЯТЂ Get toolchains"
        working-directory: ./${{ env.kernelDir }}
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num="$(echo $toolchains | jq 'length')"
          echo $toolchains_num
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo $toolchains | jq -r ".[$i].name")
            repo=$(echo $toolchains | jq -r ".[$i].repo")
            branch=$(echo $toolchains | jq -r ".[$i].branch")
            git clone --recursive --branch $branch $repo $name --depth=1
            echo "$(pwd)/$name/" >> $GITHUB_PATH
            echo "$(pwd)/$name/bin" >> $GITHUB_PATH
          done
          echo "PATH Variable: $PATH"

      - name: "рЯШО Set args"
        id: generate-args
        working-directory: ./${{ env.kernelDir }}
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
          extraParams: "${{ toJSON(matrix.repos.extraParams) }}"
          THREAD: $(nproc --all)
        run: |
          echo "PATH Variable: $PATH"
          ARCH=$(echo $params | jq -r ".ARCH")
          CROSS_COMPILE=$(echo $params | jq -r ".CROSS_COMPILE")
          CROSS_COMPILE_COMPAT=$(echo $params | jq -r ".CROSS_COMPILE_COMPAT")
          CROSS_COMPILE_ARM32=$(echo $params | jq -r ".CROSS_COMPILE_ARM32")
          CLANG_TRIPLE=$(echo $params | jq -r ".CLANG_TRIPLE")
          AR=$(echo $params | jq -r ".AR")
          CC=$(echo $params | jq -r ".CC")

          echo "ARCH=$ARCH" >> $GITHUB_ENV

          args="-j$(nproc --all)"
          if [ -n "${{ env.OUT_DIR }}" ]; then
            mkdir -p $(pwd)/${{ env.OUT_DIR }}
            args="$args O=$(pwd)/${{ env.OUT_DIR }}"
          fi
          if [ -n "$ARCH" ]; then
            args="$args ARCH=$ARCH"
          fi
          if [ -n "$CROSS_COMPILE" ]; then
            args="$args CROSS_COMPILE=$CROSS_COMPILE"
          fi
          if [ -n "$CLANG_TRIPLE" ]; then
            args="$args CLANG_TRIPLE=$CLANG_TRIPLE"
          fi
          if [ -n "$CROSS_COMPILE_COMPAT" ]; then
            args="$args CROSS_COMPILE_ARM32=$CROSS_COMPILE_COMPAT"
          fi
          if [ -n "$AR" ]; then
            args="$args AR=$AR"
          fi
          if [ -n "$CC" ]; then
            args="$args CC=$CC"
          fi
          echo "args=$args" >> $GITHUB_OUTPUT
          echo "extraParams_toJson: $extraParams"
          extra_params=$(echo $extraParams | jq -r ' to_entries[] | select(.value != "") | "\(.key)=\(.value)"' | tr "\n" " " | sed 's/ $//')
          echo "args=$args $extra_params" >> $GITHUB_OUTPUT

      - name: "рЯШЛ Setup KernelSU-Next"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        if: ${{ env.withKernelSU == 'true' }}
        run: |
          # Clean any previous KernelSU integration
          rm -rf ./KernelSU-Next ./KernelSU ./drivers/kernelsu
          # Integrate KernelSU-Next pinned to the v3.0.1-LEGACY tag: the legacy line targets old
          # non-GKI kernels. Its kernel_compat.h defines TWA_RESUME/strncpy_from_user_nofault and its
          # Kbuild auto-backports path_umount into fs/namespace.c for kernel 4.14. (v3.3.0 syscall-table
          # hook needs syscall_fn_t = arm64 >= 4.19; plain v3.0.1 uses 5.8+ APIs unguarded.)
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s v3.0.1-legacy
          # Enable KernelSU + kprobes-based syscall hooks in the defconfig
          DEFCONF="./arch/${{ env.ARCH }}/configs/${{ env.DEFCONFIG_NAME }}"
          {
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_KPROBE_EVENTS=y"
            echo "CONFIG_KSU=y"
          } >> "$DEFCONF"
          echo "----- KernelSU-Next integration -----"
          ls -la ./drivers/kernelsu || true
          grep -n "kernelsu" ./drivers/Makefile ./drivers/Kconfig || true
          echo "----- tail defconfig -----"
          tail -n 12 "$DEFCONF"

      - name: "рЯСН Make defconfig"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          echo "PATH Variable: $PATH"
          make ${{ env.args }} ${{ env.DEFCONFIG_NAME }}

      - name: "рЯПівАНвШ†пЄП Before Action "
        env:
          args: ${{ steps.generate-args.outputs.args }}
        working-directory: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}
        run: |
          echo "args ---> ${args}"
          echo "current path ---> $(pwd)"
          echo "CONFIG_OF_CONFIGFS=y" >> .config
          echo "CONFIG_OF_OVERLAY=y" >> .config
          cat .config

      - name: "рЯОґ Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          echo "PATH Variable: $PATH"
          make ${args}

      - name: "рЯПівАНвШ†пЄП Post Action "
        run: |
          #make ${args} dtbs
          #make ${args} dtboimage
          pwd
          find ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/ -type f

      - name: "рЯУ¶ Build flashable AnyKernel3 zip"
        if: ${{ env.withKernelSU == 'true' }}
        working-directory: ./${{ env.kernelDir }}
        run: |
          BOOT="./${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/.github AnyKernel3/README.md
          # Kernel image (prefer gzip); Samsung Tab S6 Lite uses separate dtb/dtbo partitions,
          # so a kernel-only boot repack is sufficient - existing dtb/dtbo stay compatible.
          if [ -f "$BOOT/Image.gz" ]; then cp "$BOOT/Image.gz" AnyKernel3/Image.gz; else cp "$BOOT/Image" AnyKernel3/Image; fi
          cat > AnyKernel3/anykernel.sh <<'AKEOF'
          ### AnyKernel3 Ramdisk Mod Script
          properties() { '
          kernel.string=KernelSU-Next for Galaxy Tab S6 Lite WiFi (gta4xlwifi / SM-P610) - lineage-22.2
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=1
          device.name1=gta4xlwifi
          device.name2=gta4xl
          device.name3=SM-P610
          device.name4=SM-P615
          device.name5=gta4xlwifixx
          supported.versions=
          supported.patchlevels=
          '; }
          block=/dev/block/by-name/boot;
          is_slot_device=0;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          dump_boot;
          write_boot;
          AKEOF
          ZIP="KernelSU-Next-gta4xlwifi-r${{ github.run_number }}.zip"
          ( cd AnyKernel3 && zip -r9 "../$ZIP" . -x ".git*" )
          ls -la ./*.zip
          echo "Built flashable zip: $ZIP"

      - name: "рЯІњ Upload flashable KernelSU zip"
        if: ${{ env.withKernelSU == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-Next-${{ env.kernelDevice }}-flashable
          path: ./${{ env.kernelDir }}/*.zip
          if-no-files-found: warn
          retention-days: 14

      - name: "рЯТЫ Upload Image"
        uses: actions/upload-artifact@v4
        with:
          name: Image(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image
          if-no-files-found: ignore
          retention-days: 7

      - name: "рЯТЩ Upload Image.gz"
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image.gz
          if-no-files-found: ignore
          retention-days: 7

      - name: "рЯТЬ Upload dtb"
        uses: actions/upload-artifact@v4
        with:
          name: dtb(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtb
          if-no-files-found: ignore
          retention-days: 7

      - name: "вЭ§пЄП Upload dtbo.img"
        uses: actions/upload-artifact@v4
        with:
          name: dtbo.img(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtbo.img
          if-no-files-found: ignore
          retention-days: 7
